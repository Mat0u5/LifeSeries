name: build

on:
  push:
    branches:
      - testing

jobs:
  notify:
    if: ${{ !contains(github.event.head_commit.message, '{skip_discord}') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Get branch name
        id: get_branch_name
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Prepare and clean commit message
        id: prepare_commit_message
        run: |
          RAW_COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          
          # Extract tags from {...}
          TAGS=$(echo "$RAW_COMMIT_MESSAGE" | grep -oE '\{[^}]+\}' | tr -d '{}' | awk '{tags = tags $0", "} END {sub(", $", "", tags); print tags}')
          
          if [ -n "$TAGS" ]; then
            COMMIT_FOOTER="\\n\`Tags: $TAGS\`"
          else
            COMMIT_FOOTER=""
          fi
          
          # Clean message: remove tags, trim empty lines
          CLEANED_MESSAGE=$(echo "$RAW_COMMIT_MESSAGE" | sed -E 's/\{[^}]+\}//g' | sed '/^\s*$/d')
          
          # Escape newlines as literal \n, encode with jq to handle quotes
          COMMIT_MESSAGE=$(echo "$CLEANED_MESSAGE" | sed ':a;N;$!ba;s/\n/\\n/g' | jq -Rs)
          
          echo "COMMIT_MESSAGE=$COMMIT_MESSAGE" >> $GITHUB_ENV
          echo "COMMIT_FOOTER=$COMMIT_FOOTER" >> $GITHUB_ENV



      - name: Get Title
        id: discord_title
        run: |
          if echo "${{ github.event.head_commit.message }}" | grep -q "{skip_ping}"; then
            echo "MESSAGE_TITLE=*Ping Skipped.*" >> $GITHUB_ENV
          else
            echo "MESSAGE_TITLE=<@&1312808018483613726>" >> $GITHUB_ENV
          fi

      - name: Discord Message
        uses: satak/webrequest-action@master
        with:
          url: ${{ secrets.DISCORD_WEBHOOK }}
          method: POST
          payload: '{ "content": "${{ env.MESSAGE_TITLE }}", "embeds": [{ "title": "[${{ github.repository }}:${{ env.BRANCH_NAME }}] - new commit", "author": {"name": "${{ github.event.head_commit.author.name}}","url": "https://github.com/${{ github.event.head_commit.author.name}}","icon_url": "https://github.com/${{ github.event.head_commit.author.name}}.png"},"description": "**Testing branch**\n\n`Commit Message:` ```${{ env.COMMIT_MESSAGE }}```${{ env.COMMIT_FOOTER }}", "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}", "color": 5315202 }] }'

  build:
    if: ${{ contains(github.event.head_commit.message, '{build}') }}
    strategy:
      matrix:
        minecraft_version: [1.21, 1.21.2, 1.21.4, 1.21.5, 1.21.6]
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts-${{ matrix.minecraft_version }}
          path: versions/${{ matrix.minecraft_version }}/build/libs/